<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPPS Pedduru - Who's Up? 🎉</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a8b 0%, #ff6a88 30%, #ff99ac 60%, #fecfef 100%);
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeIn 0.8s ease-in;
  }
  .school-name {
    font-size: 32px;
    font-weight: bold;
    color: #d6336c;
    margin: 0;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
  }
  .school-emoji {
    font-size: 40px;
    margin: 8px 0;
    animation: bounce 2s infinite;
  }
  .card {
    background: #fffdf7;
    border-radius: 24px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    border: 4px dashed #ff6a88;
  }
  h1 {
    text-align: center;
    color: #d6336c;
    margin-top: 0;
    font-size: 28px;
  }
  .sub {
    text-align: center;
    color: #888;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  input[type="text"] {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 2px solid #ffc2d1;
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: #ff6a88;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #addBtn {
    background: #ffd166;
    color: #6b4400;
    padding: 10px 16px;
    font-size: 15px;
    white-space: nowrap;
  }
  #addBtn:hover { background: #ffc23f; }
  #addBtn:active {
    transform: scale(0.95);
  }
  ul#list {
    list-style: none;
    padding: 0;
    margin: 0 0 16px;
    max-height: 220px;
    overflow-y: auto;
  }
  ul#list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff5e6;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 15px;
    border: 1px solid #ffe0a3;
    transition: transform 0.2s;
    word-break: break-word;
  }
  ul#list li.picked {
    background: #d3f9d8;
    border-color: #69db7c;
    transform: scale(1.03);
  }
  .removeBtn {
    background: none;
    color: #d6336c;
    font-size: 16px;
    padding: 2px 8px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .removeBtn:active {
    transform: scale(0.9);
  }
  .count {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    margin-bottom: 16px;
  }
  #pickBtn {
    width: 100%;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    color: white;
    font-size: 20px;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 6px 0 #d6336c;
    transition: transform 0.1s;
  }
  #pickBtn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #d6336c;
  }
  #pickBtn:disabled {
    background: #ccc;
    box-shadow: 0 6px 0 #999;
    cursor: not-allowed;
  }
  #result {
    margin-top: 20px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2b8a3e;
    word-break: break-word;
    padding: 0 8px;
  }
  #result.spinning {
    color: #d6336c;
    animation: shake 0.15s infinite;
  }
  @keyframes shake {
    0% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
    100% { transform: rotate(-3deg); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .confetti {
    position: fixed;
    top: -20px;
    font-size: 22px;
    animation: fall linear forwards;
    pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
  }
  .hint {
    text-align: center;
    color: #d6336c;
    font-size: 13px;
    margin-top: 8px;
    word-break: break-word;
  }

  /* Tablet Styles (641px - 1024px) */
  @media (min-width: 641px) and (max-width: 1024px) {
    body {
      padding: 16px;
    }
    .header {
      margin-bottom: 32px;
    }
    .school-name {
      font-size: 40px;
    }
    .school-emoji {
      font-size: 48px;
    }
    .card {
      padding: 28px;
    }
    h1 {
      font-size: 32px;
    }
    #result {
      font-size: 36px;
    }
  }

  /* Mobile Styles (max-width 640px) */
  @media (max-width: 640px) {
    body {
      padding: 8px;
    }
    .header {
      margin-bottom: 16px;
    }
    .school-name {
      font-size: 26px;
      letter-spacing: 0.5px;
    }
    .school-emoji {
      font-size: 32px;
      margin: 6px 0;
    }
    .card {
      padding: 20px;
      border-radius: 16px;
      max-width: 100%;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }
    .sub {
      font-size: 12px;
      margin-bottom: 16px;
    }
    .input-row {
      gap: 6px;
      margin-bottom: 10px;
    }
    input[type="text"] {
      min-width: 100px;
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 10px;
    }
    #addBtn {
      padding: 8px 14px;
      font-size: 14px;
      flex-shrink: 0;
    }
    ul#list {
      max-height: 200px;
      margin-bottom: 12px;
    }
    ul#list li {
      padding: 6px 10px;
      font-size: 13px;
      margin-bottom: 5px;
      border-radius: 8px;
    }
    .removeBtn {
      font-size: 14px;
      padding: 2px 6px;
      margin-left: 6px;
    }
    .count {
      font-size: 12px;
      margin-bottom: 12px;
    }
    #pickBtn {
      font-size: 18px;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 4px 0 #d6336c;
    }
    #pickBtn:active {
      box-shadow: 0 1px 0 #d6336c;
    }
    #result {
      font-size: 26px;
      min-height: 50px;
      margin-top: 16px;
      padding: 0 4px;
    }
    .hint {
      font-size: 12px;
      margin-top: 6px;
    }
  }

  /* Small Mobile Styles (max-width 480px) */
  @media (max-width: 480px) {
    body {
      padding: 4px;
    }
    .header {
      margin-bottom: 12px;
    }
    .school-name {
      font-size: 22px;
      letter-spacing: 0px;
    }
    .school-emoji {
      font-size: 28px;
      margin: 4px 0;
    }
    .card {
      padding: 16px;
      border-radius: 14px;
      border-width: 3px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }
    .sub {
      font-size: 11px;
      margin-bottom: 12px;
    }
    .input-row {
      gap: 4px;
      margin-bottom: 8px;
    }
    input[type="text"] {
      min-width: 80px;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 8px;
    }
    #addBtn {
      padding: 6px 12px;
      font-size: 12px;
    }
    ul#list {
      max-height: 180px;
      margin-bottom: 10px;
    }
    ul#list li {
      padding: 5px 8px;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .removeBtn {
      font-size: 13px;
      padding: 1px 5px;
      margin-left: 4px;
    }
    .count {
      font-size: 11px;
      margin-bottom: 10px;
    }
    #pickBtn {
      font-size: 16px;
      padding: 12px;
      box-shadow: 0 3px 0 #d6336c;
    }
    #result {
      font-size: 22px;
      min-height: 45px;
      margin-top: 12px;
    }
    .hint {
      font-size: 11px;
      margin-top: 4px;
    }
    .confetti {
      font-size: 18px;
    }
  }

  /* Landscape Orientation */
  @media (max-width: 840px) and (orientation: landscape) {
    body {
      padding: 8px;
      min-height: auto;
    }
    .header {
      margin-bottom: 12px;
    }
    .school-name {
      font-size: 20px;
    }
    .school-emoji {
      font-size: 24px;
      margin: 2px 0;
    }
    .card {
      padding: 16px;
      max-height: 90vh;
      overflow-y: auto;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }
    .sub {
      font-size: 11px;
      margin-bottom: 10px;
    }
    ul#list {
      max-height: 150px;
    }
    #result {
      font-size: 20px;
      min-height: 40px;
      margin-top: 10px;
    }
  }
</style>
</head>
<body>
<div class="header">
  <h2 class="school-name">🏫 MPPS Pedduru</h2>
  <div class="school-emoji">✨</div>
</div>

<div class="card">
  <h1>🎲 Who's up next?</h1>
  <div class="sub">Add 2–20 participants, then tap the button!</div>

  <div class="input-row">
    <input type="text" id="nameInput" placeholder="Type a name and hit Enter..." maxlength="30">
    <button id="addBtn">Add</button>
  </div>

  <ul id="list"></ul>
  <div class="count" id="count">0 participants</div>

  <button id="pickBtn" disabled>🎉 Pick someone!</button>

  <div id="result"></div>
  <div class="hint" id="hint"></div>
</div>

<script>
  const nameInput = document.getElementById('nameInput');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('list');
  const countEl = document.getElementById('count');
  const pickBtn = document.getElementById('pickBtn');
  const resultEl = document.getElementById('result');
  const hintEl = document.getElementById('hint');

  let participants = [];
  const MIN = 2, MAX = 20;

  function render() {
    list.innerHTML = '';
    participants.forEach((name, i) => {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.textContent = name;
      const btn = document.createElement('button');
      btn.textContent = '✕';
      btn.className = 'removeBtn';
      btn.title = 'Remove';
      btn.onclick = () => {
        participants.splice(i, 1);
        render();
      };
      li.appendChild(span);
      li.appendChild(btn);
      li.dataset.index = i;
      list.appendChild(li);
    });
    countEl.textContent = participants.length + ' participant' + (participants.length === 1 ? '' : 's');

    if (participants.length < MIN) {
      pickBtn.disabled = true;
      hintEl.textContent = 'Add at least ' + MIN + ' participants to start.';
    } else if (participants.length > MAX) {
      pickBtn.disabled = true;
      hintEl.textContent = 'Whoa, too many! Max is ' + MAX + ' participants.';
    } else {
      pickBtn.disabled = false;
      hintEl.textContent = '';
    }
  }

  function addName() {
    const name = nameInput.value.trim();
    if (!name) return;
    if (participants.length >= MAX) {
      hintEl.textContent = 'Max is ' + MAX + ' participants!';
      return;
    }
    if (participants.includes(name)) {
      hintEl.textContent = '"' + name + '" is already on the list.';
      return;
    }
    participants.push(name);
    nameInput.value = '';
    render();
    nameInput.focus();
  }

  addBtn.onclick = addName;
  nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addName();
  });

  function confettiBurst() {
    const emojis = ['🎉','✨','🎊','⭐','🎈'];
    for (let i = 0; i < 24; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  pickBtn.onclick = () => {
    if (participants.length < MIN || participants.length > MAX) return;
    pickBtn.disabled = true;
    resultEl.classList.add('spinning');
    resultEl.textContent = '🤔';

    document.querySelectorAll('#list li').forEach(li => li.classList.remove('picked'));

    let spins = 0;
    const maxSpins = 18;
    const interval = setInterval(() => {
      const idx = Math.floor(Math.random() * participants.length);
      resultEl.textContent = participants[idx];
      spins++;
      if (spins >= maxSpins) {
        clearInterval(interval);
        const winnerIdx = Math.floor(Math.random() * participants.length);
        const winner = participants[winnerIdx];
        resultEl.textContent = '🏆 ' + winner + '!';
        resultEl.classList.remove('spinning');
        const li = list.querySelector('li[data-index="' + winnerIdx + '"]');
        if (li) li.classList.add('picked');
        confettiBurst();
        pickBtn.disabled = false;
      }
    }, 80);
  };

  render();
</script>
</body>
</html>
