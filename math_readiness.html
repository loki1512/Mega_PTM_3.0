<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Readiness: Learn & Play</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --sky: #4FC3F7;
    --sun: #FFD600;
    --grass: #66BB6A;
    --coral: #FF7043;
    --purple: #AB47BC;
    --pink: #EC407A;
    --teal: #26C6DA;
    --orange: #FFA726;
    --indigo: #5C6BC0;
    --bg: #F3F7FF;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --muted: #6B6B6B;
    --radius: 20px;
    --shadow: 0 6px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #confetti-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  header {
    background: linear-gradient(135deg, #5C6BC0 0%, #26C6DA 50%, #66BB6A 100%);
    padding: 1.5rem 1rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 10px, transparent 10px, transparent 20px);
  }
  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    position: relative;
  }
  .header-sub {
    font-size: 1rem;
    color: rgba(255,255,255,0.9);
    margin-top: 0.3rem;
    font-weight: 700;
    position: relative;
  }
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50px;
    padding: 0.3rem 1rem;
    font-weight: 800;
    font-size: 1rem;
    color: #fff;
    margin-top: 0.7rem;
    position: relative;
  }

  .modules-screen { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
  .modules-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; text-align: center; margin-bottom: 1.5rem; color: #5C6BC0; }
  .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 1rem; }
  .module-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 1.4rem 1rem; text-align: center; cursor: pointer; border: 3px solid transparent;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; position: relative; overflow: hidden;
  }
  .module-card:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
  .module-card.done { border-color: var(--grass); }
  .module-card.done::after { content: '✓'; position: absolute; top: 8px; right: 12px; font-size: 1.2rem; color: var(--grass); font-weight: 900; }
  .module-icon { font-size: 3rem; margin-bottom: 0.5rem; line-height: 1; }
  .module-name { font-family: 'Fredoka One', cursive; font-size: 0.95rem; color: var(--text); line-height: 1.2; }
  .module-progress { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
  .module-bar { height: 6px; background: #eee; border-radius: 99px; margin-top: 0.5rem; overflow: hidden; }
  .module-bar-fill { height: 100%; border-radius: 99px; background: var(--grass); transition: width 0.5s; }

  .lesson-screen { max-width: 740px; margin: 0 auto; padding: 1.5rem 1rem 3rem; display: none; }
  .lesson-screen.active { display: block; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; background: none; border: 2.5px solid var(--orange);
    color: var(--orange); border-radius: 50px; padding: 0.4rem 1rem; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.9rem; cursor: pointer; margin-bottom: 1rem; transition: background 0.15s, color 0.15s;
  }
  .back-btn:hover { background: var(--orange); color: #fff; }

  .lesson-nav { display: flex; gap: 0.45rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .lesson-dot {
    width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid #ddd; background: #fff;
    cursor: pointer; font-weight: 800; font-size: 0.78rem; color: var(--muted); transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .lesson-dot.active { background: var(--indigo); border-color: var(--indigo); color: #fff; }
  .lesson-dot.done { background: var(--grass); border-color: var(--grass); color: #fff; }

  .question-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.8rem 1.5rem; position: relative; }
  .q-type-badge {
    display: inline-block; background: #E8EAF6; color: #3949AB; border-radius: 50px; padding: 0.2rem 0.9rem;
    font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.8rem;
  }
  .q-prompt { font-family: 'Fredoka One', cursive; font-size: 1.25rem; line-height: 1.35; margin-bottom: 1.2rem; color: #333; }
  .q-visual { margin-bottom: 1.3rem; text-align: center; }

  .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
  .option-btn {
    background: #F5F5F5; border: 3px solid #E0E0E0; border-radius: 14px; padding: 1rem 0.8rem;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center;
    transition: all 0.15s; color: var(--text);
  }
  .option-btn:hover:not(:disabled) { border-color: var(--indigo); background: #E8EAF6; transform: scale(1.03); }
  .option-btn.correct { background: #E8F5E9; border-color: var(--grass); color: #2E7D32; }
  .option-btn.wrong { background: #FFEBEE; border-color: #EF5350; color: #C62828; }
  .option-btn.reveal { background: #E8F5E9; border-color: var(--grass); color: #2E7D32; }
  .option-btn:disabled { cursor: default; }

  .symbol-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 320px; margin: 0 auto; }
  .symbol-btn {
    background: #F5F5F5; border: 3px solid #E0E0E0; border-radius: 16px; padding: 1.2rem;
    font-family: 'Fredoka One', cursive; font-size: 2rem; cursor: pointer; transition: all 0.15s; color: var(--indigo);
  }
  .symbol-btn:hover:not(:disabled) { border-color: var(--indigo); background: #E8EAF6; transform: scale(1.06); }
  .symbol-btn.correct { background: #E8F5E9; border-color: var(--grass); color: #2E7D32; }
  .symbol-btn.wrong { background: #FFEBEE; border-color: #EF5350; color: #C62828; }
  .symbol-btn.reveal { background: #E8F5E9; border-color: var(--grass); color: #2E7D32; }

  .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .tf-btn { padding: 1.2rem; border-radius: 16px; border: 3px solid #E0E0E0; background: #F5F5F5; font-family: 'Fredoka One', cursive; font-size: 1.5rem; cursor: pointer; transition: all 0.15s; }
  .tf-btn:hover:not(:disabled) { transform: scale(1.04); }
  .tf-btn.true-btn:hover:not(:disabled) { background: #E8F5E9; border-color: var(--grass); }
  .tf-btn.false-btn:hover:not(:disabled) { background: #FFEBEE; border-color: #EF5350; }
  .tf-btn.correct { background: #E8F5E9; border-color: var(--grass); }
  .tf-btn.wrong { background: #FFEBEE; border-color: #EF5350; }
  .tf-btn.reveal { background: #E8F5E9; border-color: var(--grass); }

  .numeric-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .numeric-input-row { display: flex; align-items: center; gap: 0.6rem; }
  .numeric-input {
    width: 160px; font-size: 1.6rem; font-family: 'Fredoka One', cursive; text-align: center;
    border: 3px solid #C5CAE9; border-radius: 14px; padding: 0.6rem; background: #F8F9FF; color: var(--indigo);
    transition: border-color 0.15s;
  }
  .numeric-input:focus { outline: none; border-color: var(--indigo); }
  .numeric-input.correct { border-color: var(--grass); background: #E8F5E9; color: #2E7D32; }
  .numeric-input.wrong { border-color: #EF5350; background: #FFEBEE; color: #C62828; }
  .numeric-submit {
    background: var(--indigo); color: #fff; border: none; border-radius: 50px; padding: 0.7rem 1.6rem;
    font-family: 'Fredoka One', cursive; font-size: 1.05rem; cursor: pointer; transition: transform 0.15s, background 0.15s;
  }
  .numeric-submit:hover { background: #3949AB; transform: scale(1.04); }
  .numeric-submit:disabled { opacity: 0.5; cursor: default; transform: none; }
  .numeric-hint { font-size: 0.85rem; color: var(--muted); }

  .match-wrap { display: flex; gap: 1rem; align-items: flex-start; flex-wrap: wrap; }
  .match-col { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 0.6rem; }
  .match-col-title { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; letter-spacing: 0.05em; }
  .match-item {
    background: #F0F4FF; border: 2.5px solid #C5CAE9; border-radius: 12px; padding: 0.7rem 0.9rem;
    font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .match-item:hover:not(.matched):not(:disabled) { background: #E8EAF6; border-color: var(--indigo); }
  .match-item.selected { background: #7986CB; border-color: var(--indigo); color: #fff; }
  .match-item.matched { background: #E8F5E9; border-color: var(--grass); color: #2E7D32; cursor: default; }
  .match-item.wrong-flash { background: #FFEBEE; border-color: #EF5350; }
  .match-connector { display: flex; align-items: center; justify-content: center; font-size: 1.5rem; padding-top: 1.5rem; }

  .order-wrap { display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center; margin-bottom: 1rem; min-height: 70px; padding: 1rem; background: #F5F5F5; border-radius: 14px; border: 2.5px dashed #DDD; }
  .order-chip {
    background: #fff; border: 3px solid #C5CAE9; border-radius: 14px; padding: 0.7rem 1.1rem;
    font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: grab; transition: all 0.15s; user-select: none; color: var(--indigo);
    position: relative;
  }
  .order-chip.dragging { opacity: 0.4; }
  .order-chip .order-pos { position: absolute; top: -10px; left: -10px; background: var(--indigo); color: #fff; border-radius: 50%; width: 22px; height: 22px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-family: 'Nunito',sans-serif; font-weight: 800; }
  .order-chip.correct-pos { border-color: var(--grass); background: #E8F5E9; color: #2E7D32; }
  .order-chip.wrong-pos { border-color: #EF5350; background: #FFEBEE; color: #C62828; }
  .order-check-btn {
    background: var(--purple); color: #fff; border: none; border-radius: 50px; padding: 0.7rem 1.8rem;
    font-family: 'Fredoka One', cursive; font-size: 1.1rem; cursor: pointer; transition: transform 0.15s, background 0.15s; display: block; margin: 0 auto;
  }
  .order-check-btn:hover { background: #8E24AA; transform: scale(1.04); }
  .order-hint { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 0.8rem; }

  .label-options-tray { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; padding: 0.8rem; background: #F9F9F9; border-radius: 14px; border: 2px solid #EEE; justify-content: center; }
  .label-chip { background: #fff; border: 2.5px solid #C5CAE9; border-radius: 50px; padding: 0.4rem 1rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--text); }
  .label-chip:hover { background: #E8EAF6; border-color: var(--indigo); }
  .label-chip.selected { background: var(--indigo); color: #fff; border-color: var(--indigo); }
  .label-chip.used { opacity: 0.35; cursor: default; pointer-events: none; }

  .feedback-bar { display: none; border-radius: 14px; padding: 1rem 1.2rem; margin-top: 1.2rem; font-weight: 700; font-size: 1rem; align-items: center; gap: 0.8rem; }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct-fb { background: #E8F5E9; color: #2E7D32; border: 2px solid #A5D6A7; }
  .feedback-bar.wrong-fb { background: #FFEBEE; color: #C62828; border: 2px solid #EF9A9A; }
  .feedback-icon { font-size: 1.5rem; }

  .next-btn {
    display: none; margin-top: 1.2rem; background: var(--orange); color: #fff; border: none; border-radius: 50px;
    padding: 0.8rem 2rem; font-family: 'Fredoka One', cursive; font-size: 1.2rem; cursor: pointer;
    transition: transform 0.15s, background 0.15s; box-shadow: 0 4px 0 #E65100;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #E65100; }
  .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E65100; }
  .next-btn.show { display: inline-block; }

  .result-screen { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; text-align: center; display: none; }
  .result-screen.active { display: block; }
  .result-trophy { font-size: 5rem; margin-bottom: 1rem; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  .result-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #5C6BC0; margin-bottom: 0.5rem; }
  .result-score { font-family: 'Fredoka One', cursive; font-size: 3.5rem; color: var(--grass); margin: 0.5rem 0; }
  .result-msg { font-size: 1.1rem; color: var(--muted); margin-bottom: 1.5rem; }
  .result-stars { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: 0.2em; }
  .result-retry-btn, .result-home-btn {
    display: inline-block; border-radius: 50px; padding: 0.8rem 2rem; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; cursor: pointer; border: none; margin: 0.4rem; transition: transform 0.15s;
  }
  .result-retry-btn { background: var(--orange); color: #fff; box-shadow: 0 4px 0 #E65100; }
  .result-home-btn { background: var(--sky); color: #fff; box-shadow: 0 4px 0 #0288D1; }
  .result-retry-btn:hover, .result-home-btn:hover { transform: translateY(-2px); }

  .progress-screen { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 3rem; display: none; }
  .progress-screen.active { display: block; }
  .progress-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; text-align: center; margin-bottom: 1.2rem; color: #5C6BC0; }
  .progress-row { display: flex; align-items: center; gap: 1rem; background: #fff; border-radius: 14px; padding: 0.9rem 1.1rem; margin-bottom: 0.7rem; box-shadow: var(--shadow); }
  .progress-row-icon { font-size: 1.8rem; }
  .progress-row-info { flex: 1; }
  .progress-row-title { font-weight: 800; font-size: 0.95rem; }
  .progress-row-bar { height: 8px; background: #eee; border-radius: 99px; margin-top: 0.4rem; overflow: hidden; }
  .progress-row-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
  .progress-row-pct { font-weight: 800; font-size: 0.9rem; color: var(--muted); min-width: 44px; text-align: right; }

  .nav-tabs { display: flex; justify-content: center; gap: 0.5rem; margin: 1.2rem 0; }
  .nav-tab { background: none; border: 2px solid transparent; color: var(--muted); font-weight: 800; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: 50px; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .nav-tab.active { background: #fff; color: var(--indigo); border-color: var(--indigo); }

  .floaters { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .floater { position: absolute; font-size: 1.5rem; opacity: 0.10; animation: floatUp linear infinite; }
  @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0.10; } 100% { transform: translateY(-120px) rotate(360deg); opacity: 0; } }

  .star-burst { position: fixed; pointer-events: none; z-index: 998; font-size: 2rem; animation: starBurst 0.7s ease-out forwards; }
  @keyframes starBurst { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 60% { transform: scale(1.4) rotate(180deg); opacity: 1; } 100% { transform: scale(0.8) rotate(360deg) translateY(-40px); opacity: 0; } }

  .modules-screen, .lesson-screen, .result-screen, .progress-screen { position: relative; z-index: 1; }

  .menu-table { border-collapse: collapse; margin: 0 auto; font-size: 0.95rem; box-shadow: var(--shadow); border-radius: 12px; overflow: hidden; }
  .menu-table th { background: var(--indigo); color: #fff; padding: 0.5rem 1rem; font-weight: 800; }
  .menu-table td { padding: 0.5rem 1rem; border-bottom: 1px solid #eee; background: #fff; }
  .menu-table tr:last-child td { border-bottom: none; }

  .passbook-card { display: inline-block; background: #FFF8E1; border: 2px solid #FFE082; border-radius: 14px; padding: 1rem 1.4rem; font-family: 'Fredoka One', cursive; }
  .passbook-row { display: flex; justify-content: space-between; gap: 2rem; font-size: 0.95rem; padding: 0.3rem 0; color: #5D4037; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="floaters" id="floaters"></div>

<header>
  <div class="header-title">🔢 Math Readiness: Learn & Play ✨</div>
  <div class="header-sub">Class 5 Bridge Course</div>
  <div class="score-badge" id="header-score">⭐ Score: <span id="total-score">0</span> pts</div>
</header>

<div class="modules-screen" id="modules-screen">
  <div class="modules-title">🎒 Pick a Module to Explore!</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-modules" onclick="showTab('modules')">📚 Modules</button>
    <button class="nav-tab" id="tab-progress" onclick="showTab('progress')">📊 My Progress</button>
  </div>
  <div class="modules-grid" id="modules-grid"></div>
</div>

<div class="progress-screen" id="progress-screen">
  <div class="progress-title">📊 My Progress</div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="showTab('modules')">📚 Modules</button>
    <button class="nav-tab active" id="tab-progress2" onclick="showTab('progress')">📊 My Progress</button>
  </div>
  <div id="progress-list"></div>
</div>

<div class="lesson-screen" id="lesson-screen">
  <button class="back-btn" onclick="goHome()">← Back to Modules</button>
  <div id="lesson-module-title" style="font-family:'Fredoka One',cursive;font-size:1.3rem;color:#5C6BC0;margin-bottom:0.8rem;"></div>
  <div class="lesson-nav" id="lesson-nav"></div>
  <div class="question-card" id="question-card"></div>
  <div class="feedback-bar" id="feedback-bar">
    <span class="feedback-icon" id="feedback-icon"></span>
    <span id="feedback-text"></span>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextLesson()">Next ➜</button>
</div>

<div class="result-screen" id="result-screen">
  <div class="result-trophy">🏆</div>
  <div class="result-title">Module Complete!</div>
  <div class="result-stars" id="result-stars"></div>
  <div class="result-score" id="result-score-display"></div>
  <div class="result-msg" id="result-msg"></div>
  <button class="result-retry-btn" onclick="retryModule()">🔄 Try Again</button>
  <button class="result-home-btn" onclick="goHome()">🏠 All Modules</button>
</div>

<script>
// ==================== DATA ====================
const MODULES = [
  {
    id: 1, title: "Number System & Ordering", icon: "🔢", color: "#5C6BC0",
    lessons: [
      { id:"1.1", type:"numeric", badge:"Read the Menu!", prompt:"Look at the railway canteen menu. What is the price for one Pesarattu?",
        visual: "menu", correct:["125"], unit:"₹" },
      { id:"1.2", type:"matching", badge:"Match It!", prompt:"Match the numbers to their expanded forms.",
        pairs:[ {item:"34", match:"3 x 10 + 4 x 1"}, {item:"474", match:"4 x 100 + 7 x 10 + 4 x 1"} ] },
      { id:"1.3", type:"symbol", badge:"Compare!", prompt:"Compare the numbers. Which symbol is correct?",
        left:"781", right:"871", options:["<",">","="], correct:"<" },
      { id:"1.4", type:"ordering", badge:"Order It!", prompt:"Arrange these passbook debit amounts in ascending order (smallest to largest).",
        visual:"passbook", items:["5200","150","2500","1500"], correctOrder:["150","1500","2500","5200"] },
      { id:"1.5", type:"multiple_choice", badge:"Round It!", prompt:"Round off 2,143 to the nearest thousand.",
        visual:"numberline", options:[{text:"2000",correct:true},{text:"2500",correct:false},{text:"3000",correct:false}] }
    ]
  },
  {
    id: 2, title: "Addition & Subtraction", icon: "➕", color: "#FFA726",
    lessons: [
      { id:"2.1", type:"numeric", badge:"Add It Up!", prompt:"Solve the addition: 71 + 84 = ?", correct:["155"] },
      { id:"2.2", type:"numeric", badge:"Subtract It!", prompt:"Solve the subtraction: 934 - 213 = ?", correct:["721"] },
      { id:"2.3", type:"matching", badge:"Match It!", prompt:"Match the subtraction terms to their correct definition.",
        visual:"subtraction_table",
        pairs:[ {item:"Minuend", match:"The number you subtract from"}, {item:"Subtrahend", match:"The number being subtracted"}, {item:"Difference", match:"The result of subtraction"} ] },
      { id:"2.4", type:"true_false", badge:"True or False?", visual:"truck",
        prompt:"Word Problem Strategy: If a truck's weight is 4,370 kg and 2,050 kg of iron rods are placed on it, we must ADD the numbers to find the total weight.",

const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type='sine', dur=0.15, vol=0.3) {
  const o = AC.createOscillator(); const g = AC.createGain();
  o.connect(g); g.connect(AC.destination); o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(AC.currentTime); o.stop(AC.currentTime + dur);
}
function playCorrect() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.2,0.25), i*80)); }
function playWrong() { [300,250].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.25,0.2), i*120)); }

// ==================== CONFETTI ====================
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiPieces = []; let confettiRunning = false;
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();
function launchConfetti(count=80) {
  const colors = ['#5C6BC0','#FFD600','#66BB6A','#26C6DA','#AB47BC','#EC407A','#FFA726'];
  for (let i=0;i<count;i++) {
    confettiPieces.push({ x:Math.random()*canvas.width, y:-10, vx:(Math.random()-0.5)*6, vy:Math.random()*4+2,
      color:colors[Math.floor(Math.random()*colors.length)], size:Math.random()*10+5, rot:Math.random()*360,
      rotV:(Math.random()-0.5)*8, shape: Math.random()>0.5?'rect':'circle' });
  }
  if (!confettiRunning) animateConfetti();
}
function animateConfetti() {
  confettiRunning = true;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20);
  confettiPieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle = p.color;
    if (p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  if (confettiPieces.length>0) requestAnimationFrame(animateConfetti);
  else { confettiRunning=false; ctx.clearRect(0,0,canvas.width,canvas.height); }
}

function renderGrid(total, shaded, cols) {
  const rows = Math.ceil(total/cols);
  let html = `<svg viewBox="0 0 ${cols*30} ${rows*30}" style="max-width:240px;width:100%;">`;
  for (let i=0;i<total;i++) {
    const r = Math.floor(i/cols), c = i % cols;
    const fill = i < shaded ? '#26C6DA' : '#F5F5F5';
    html += `<rect x="${c*30+2}" y="${r*30+2}" width="26" height="26" fill="${fill}" stroke="#999" stroke-width="1"/>`;
  }
  html += `</svg>`;
  return html;
}

function renderNumeric(lesson, body) {
  const wrap = document.createElement('div'); wrap.className = 'numeric-wrap';
  const row = document.createElement('div'); row.className = 'numeric-input-row';
  if (lesson.unit) {
    const unitLbl = document.createElement('span');
    unitLbl.style = 'font-family:Fredoka One,cursive;font-size:1.4rem;color:var(--indigo);';
    unitLbl.textContent = lesson.unit;
    row.appendChild(unitLbl);
  }
  const input = document.createElement('input');
  input.type = 'text'; input.inputMode = 'numeric'; input.className = 'numeric-input';
  input.placeholder = '?';
  const submitBtn = document.createElement('button');
  submitBtn.className = 'numeric-submit'; submitBtn.textContent = 'Check ✓';
  row.appendChild(input); row.appendChild(submitBtn);
  wrap.appendChild(row);
  const hint = document.createElement('div'); hint.className = 'numeric-hint';
  hint.textContent = 'Type your answer and press Check!';
  wrap.appendChild(hint);
  body.appendChild(wrap);
  input.focus();

  function submit() {
    if (input.disabled) return;
    const val = input.value.trim().replace(/^₹/, '');
    const isCorrect = lesson.correct.some(c => c.replace(/^₹/,'') === val);
    input.disabled = true; submitBtn.disabled = true;
    if (isCorrect) {
      input.classList.add('correct');
      showFeedback(true, "Perfect! That's the right answer! 🎉");
      addScore(10); playCorrect(); launchConfetti(40);
      const r = input.getBoundingClientRect(); spawnStar(r.left + r.width/2, r.top);
    } else {
      input.classList.add('wrong');
      hint.textContent = 'The correct answer is ' + (lesson.unit||'') + lesson.correct[0];
      hint.style.color = '#C62828'; hint.style.fontWeight = '800';
      showFeedback(false, "Not quite! Check the hint below the box.");
      playWrong();
    }
    showNext();
  }
  submitBtn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

        showFeedback(false, "Not quite! The correct answer is highlighted in green.");

        showFeedback(true, "Correct! Great comparing! 🎉");
        spawnStar(e.clientX, e.clientY); addScore(10); playCorrect(); launchConfetti(40);
      } else {
        btn.classList.add('wrong');
        Array.from(grid.children).forEach((b,i) => { if (lesson.options[i]===lesson.correct) b.classList.add('reveal'); });
        document.getElementById('symbol-slot').style.color = '#C62828';
        showFeedback(false, `The correct symbol is "${lesson.correct}".`);
        playWrong();
      }
      showNext();
    });
    grid.appendChild(btn);
  });
  body.appendChild(grid);
}

// ==================== TRUE / FALSE ====================
function renderTrueFalse(lesson, body) {
  const grid = document.createElement('div'); grid.className = 'tf-grid';
  ['True','False'].forEach(val => {
    const btn = document.createElement('button'); btn.className = `tf-btn ${val.toLowerCase()}-btn`;
    btn.innerHTML = val==='True' ? '✅ True' : '❌ False';
    btn.addEventListener('click', e => {
      if (btn.disabled) return;
      grid.querySelectorAll('.tf-btn').forEach(b => b.disabled = true);
      if (val === lesson.correct) {
        btn.classList.add('correct');
        showFeedback(true, (lesson.fact || "Correct! Well done! 🎉"));
        spawnStar(e.clientX, e.clientY); addScore(10); playCorrect(); launchConfetti(40);
      } else {
        btn.classList.add('wrong');
        grid.querySelectorAll('.tf-btn').forEach(b => { if (b.textContent.includes(lesson.correct)) b.classList.add('reveal'); });
        showFeedback(false, "Oops! The correct answer is " + lesson.correct + ". " + (lesson.fact||""));
        playWrong();
      }
      showNext();
    });
    grid.appendChild(btn);
  });
  body.appendChild(grid);
}

// ==================== MATCHING ====================
function renderMatching(lesson, body) {
  let selectedLeft = null; const matched = {}; let correctCount = 0;
  const total = lesson.pairs.length;
  const wrap = document.createElement('div'); wrap.className = 'match-wrap';
  const leftCol = document.createElement('div'); leftCol.className = 'match-col';
  const arrow = document.createElement('div'); arrow.className = 'match-connector'; arrow.textContent = '↔';
  const rightCol = document.createElement('div'); rightCol.className = 'match-col';
  leftCol.innerHTML = '<div class="match-col-title">Item</div>';
  rightCol.innerHTML = '<div class="match-col-title">Match</div>';
  const shuffledRight = [...lesson.pairs].sort(() => Math.random()-0.5);

  lesson.pairs.forEach((pair,i) => {
    const lBtn = document.createElement('div'); lBtn.className = 'match-item'; lBtn.textContent = pair.item; lBtn.dataset.idx = i;
    lBtn.addEventListener('click', () => {
      if (lBtn.classList.contains('matched')) return;
      leftCol.querySelectorAll('.match-item').forEach(b => b.classList.remove('selected'));
      lBtn.classList.add('selected'); selectedLeft = i; playClick();
    });
    leftCol.appendChild(lBtn);
  });
  shuffledRight.forEach(pair => {
    const rBtn = document.createElement('div'); rBtn.className = 'match-item'; rBtn.textContent = pair.match; rBtn.dataset.match = pair.match;
    rBtn.addEventListener('click', e => {
      if (rBtn.classList.contains('matched') || selectedLeft===null) return;
      const leftPair = lesson.pairs[selectedLeft];
      if (leftPair.match === pair.match) {
        rBtn.classList.add('matched');
        leftCol.querySelector(`[data-idx="${selectedLeft}"]`).classList.remove('selected');
        leftCol.querySelector(`[data-idx="${selectedLeft}"]`).classList.add('matched');
        matched[selectedLeft]=true; correctCount++; playCorrect(); spawnStar(e.clientX,e.clientY);
        selectedLeft=null;
        if (correctCount === total) {
          showFeedback(true, "Amazing! You matched all pairs correctly! 🎉");
          addScore(10*total); launchConfetti(60); showNext();
        }
      } else {
        rBtn.classList.add('wrong-flash');
        leftCol.querySelector(`[data-idx="${selectedLeft}"]`).classList.remove('selected');
        selectedLeft=null; playWrong();
        setTimeout(()=>rBtn.classList.remove('wrong-flash'), 600);
      }
    });
    rightCol.appendChild(rBtn);
  });
  wrap.appendChild(leftCol); wrap.appendChild(arrow); wrap.appendChild(rightCol);
  body.appendChild(wrap);
  const hint = document.createElement('div');
  hint.style = 'font-size:0.85rem;color:var(--muted);margin-top:0.8rem;';
  hint.textContent = '👆 Tap an item on the left, then tap its match on the right.';
  body.appendChild(hint);
}

// ==================== ORDERING ====================
function renderOrdering(lesson, body) {
  const hint = document.createElement('div'); hint.className = 'order-hint';
  hint.textContent = '👆 Drag the chips to arrange them, or tap two chips to swap them.';
  body.appendChild(hint);

  let order = [...lesson.items];
  const wrap = document.createElement('div'); wrap.className = 'order-wrap';
  body.appendChild(wrap);
  let selectedIdx = null;

  function render() {
    wrap.innerHTML = '';
    order.forEach((val, idx) => {
      const chip = document.createElement('div'); chip.className = 'order-chip'; chip.draggable = true;
      chip.innerHTML = `<span class="order-pos">${idx+1}</span>${val}`;
      chip.dataset.idx = idx;
      chip.addEventListener('dragstart', e => { e.dataTransfer.setData('text', idx); chip.classList.add('dragging'); });
      chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
      chip.addEventListener('dragover', e => e.preventDefault());
      chip.addEventListener('drop', e => {
        e.preventDefault();
        const fromIdx = parseInt(e.dataTransfer.getData('text'));
        const toIdx = parseInt(chip.dataset.idx);
        const moved = order.splice(fromIdx,1)[0];
        order.splice(toIdx,0,moved);
        render(); playClick();
      });
      chip.addEventListener('click', () => {
        if (chip.classList.contains('correct-pos')) return;
        if (selectedIdx === null) { selectedIdx = idx; chip.style.outline = '3px solid #5C6BC0'; }
        else if (selectedIdx === idx) { selectedIdx = null; chip.style.outline = 'none'; }
        else {
          const tmp = order[selectedIdx]; order[selectedIdx] = order[idx]; order[idx] = tmp;
          selectedIdx = null; render(); playClick();
        }
      });
      wrap.appendChild(chip);
    });
  }
  render();

  const checkBtn = document.createElement('button'); checkBtn.className = 'order-check-btn'; checkBtn.textContent = '✅ Check Order!';
  checkBtn.addEventListener('click', () => {
    const isCorrect = order.every((v,i) => v === lesson.correctOrder[i]);
    wrap.querySelectorAll('.order-chip').forEach((chip,i) => {
      chip.classList.add(order[i]===lesson.correctOrder[i] ? 'correct-pos' : 'wrong-pos');
    });
    if (isCorrect) {
      showFeedback(true, "Excellent ordering! You're a sorting star! 🌟");
      addScore(10*order.length); playCorrect(); launchConfetti(60); showNext();
      checkBtn.disabled = true;
    } else {
      showFeedback(false, "Some are out of order. Green = correct spot, red = needs fixing!");
      playWrong();
      setTimeout(()=>{ wrap.querySelectorAll('.order-chip').forEach(c=>c.classList.remove('correct-pos','wrong-pos')); }, 1200);
    }
  });
  body.appendChild(checkBtn);
}

// ==================== LABEL FRACTION ====================
function renderLabelFraction(lesson, body) {
  const wrap = document.createElement('div'); wrap.style = 'text-align:center;';
  wrap.innerHTML = `
    <div style="display:inline-block;font-family:Fredoka One,cursive;font-size:3rem;color:var(--indigo);position:relative;margin-bottom:1rem;">
      <div id="frac-top" style="border-bottom:4px solid #5C6BC0;padding-bottom:6px;position:relative;">3
        <div id="zone-Numerator" style="position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:#fff;border:2px dashed #999;border-radius:8px;padding:2px 10px;font-size:0.75rem;font-weight:800;color:#555;cursor:pointer;white-space:nowrap;">Numerator?</div>
      </div>
      <div style="position:relative;">10
        <div id="zone-Denominator" style="position:absolute;bottom:-34px;left:50%;transform:translateX(-50%);background:#fff;border:2px dashed #999;border-radius:8px;padding:2px 10px;font-size:0.75rem;font-weight:800;color:#555;cursor:pointer;white-space:nowrap;">Denominator?</div>
      </div>
    </div>`;
  body.appendChild(wrap);

  const hint = document.createElement('div'); hint.style='font-size:0.85rem;color:var(--muted);margin-bottom:0.8rem;text-align:center;';
  hint.textContent = '👇 Tap a label below, then tap the matching part of the fraction!';
  body.appendChild(hint);

  const tray = document.createElement('div'); tray.className = 'label-options-tray';
  const placed = {}; let selectedLabel = null;
  lesson.parts.forEach(p => {
    const chip = document.createElement('div'); chip.className = 'label-chip'; chip.textContent = p.name; chip.dataset.label = p.name;
    chip.addEventListener('click', () => {
      if (placed[p.name]) return;
      tray.querySelectorAll('.label-chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected'); selectedLabel = p.name; playClick();
    });
    tray.appendChild(chip);
  });
  body.appendChild(tray);

  lesson.parts.forEach(p => {
    const zone = wrap.querySelector('#zone-' + p.name);
    zone.addEventListener('click', e => {
      if (placed[p.name] || !selectedLabel) return;
      if (selectedLabel === p.name) {
        placed[p.name] = true;
        zone.style.borderStyle='solid'; zone.style.borderColor='#66BB6A'; zone.style.background='#E8F5E9'; zone.style.color='#2E7D32';
        zone.textContent = p.name;
        tray.querySelector(`[data-label="${p.name}"]`).classList.add('used');
        selectedLabel = null; spawnStar(e.clientX, e.clientY); playCorrect();
        if (Object.keys(placed).length === lesson.parts.length) {
          showFeedback(true, "You labelled the fraction perfectly! 🎉");
          addScore(10*lesson.parts.length); launchConfetti(50); showNext();
        }
      } else {
        zone.style.background = '#FFEBEE'; zone.style.borderColor = '#EF5350'; playWrong();
        setTimeout(()=>{ zone.style.background='#fff'; zone.style.borderColor='#999'; }, 600);
      }
    });
  });
}

// ==================== FRACTION VISUAL ====================
function renderFractionVisual(lesson, body) {
  const grid = document.createElement('div'); grid.className = 'options-grid';
  lesson.options.forEach(opt => {
    const card = document.createElement('button'); card.className = 'option-btn';
    let bars = '';
    for (let i=0;i<opt.total;i++) bars += `<div style="width:18px;height:28px;display:inline-block;margin:1px;background:${i<opt.shaded?'#26C6DA':'#EEE'};border:1px solid #999;"></div>`;
    card.innerHTML = `<div style="margin-bottom:0.5rem;">${bars}</div>${opt.label} (${opt.shaded}/${opt.total})`;
    card.addEventListener('click', e => {
      if (card.disabled) return;
      grid.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
      if (opt.correct) {
        card.classList.add('correct');
        showFeedback(true, "Correct! 1/4 + 2/4 = 3/4! 🎉");
        spawnStar(e.clientX,e.clientY); addScore(10); playCorrect(); launchConfetti(40);
      } else {
        card.classList.add('wrong');
        Array.from(grid.children).forEach((b,i)=>{ if(lesson.options[i].correct) b.classList.add('reveal'); });
        showFeedback(false, "Not quite! The correct picture is highlighted in green.");
        playWrong();
      }
      showNext();
    });
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

// ==================== FEEDBACK & SCORE ====================
function showFeedback(correct, msg) {
  const fb = document.getElementById('feedback-bar');
  const fi = document.getElementById('feedback-icon');
  const ft = document.getElementById('feedback-text');
  fb.className = 'feedback-bar show ' + (correct ? 'correct-fb' : 'wrong-fb');
  fi.textContent = correct ? '🎉' : '😅';
  ft.textContent = msg;
}
function addScore(pts) { lessonScore += pts; totalScore += pts; document.getElementById('total-score').textContent = totalScore; }
function showNext() {
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent = currentLessonIdx < currentModule.lessons.length-1 ? 'Next Question ➜' : 'See Results! 🏆';
}
function nextLesson() {
  playClick();
  const prog = moduleProgress[currentModule.id] || { done: [], score: 0 };
  const lesson = currentModule.lessons[currentLessonIdx];
  if (!prog.done.includes(lesson.id)) prog.done.push(lesson.id);
  prog.score = (prog.score||0) + lessonScore;
  lessonScore = 0;
  moduleProgress[currentModule.id] = prog;
  currentLessonIdx++;
  if (currentLessonIdx >= currentModule.lessons.length) showResult();
  else renderLesson();
}

// ==================== RESULT ====================
function maxScoreFor(lesson) {
  if (lesson.type==='matching') return lesson.pairs.length*10;
  if (lesson.type==='ordering') return lesson.items.length*10;
  if (lesson.type==='label_fraction') return lesson.parts.length*10;
  return 10;
}
function showResult() {
  playFanfare(); launchConfetti(120);
  document.getElementById('lesson-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  const prog = moduleProgress[currentModule.id] || { done: [], score: 0 };
  const score = prog.score;
  const maxScore = currentModule.lessons.reduce((a,l) => a + maxScoreFor(l), 0);
  const pct = score / maxScore;
  const stars = pct>=0.8 ? '⭐⭐⭐' : pct>=0.5 ? '⭐⭐' : '⭐';
  const msgs = pct>=0.8 ? ["You're a superstar! 🌟","Outstanding work!","You nailed it! 🎉"]
    : pct>=0.5 ? ["Good effort! Keep going!","You're getting there! 💪"]
    : ["Keep practising, you'll get it! 🌱"];
  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-score-display').textContent = score + ' pts';
  document.getElementById('result-msg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
}
function retryModule() { playClick(); moduleProgress[currentModule.id] = { done: [], score: 0 }; startModule(currentModule); }

// ==================== INIT ====================
initFloaters();
renderHome();
document.addEventListener('click', () => { if (AC.state==='suspended') AC.resume(); }, { once: true });
</script>
